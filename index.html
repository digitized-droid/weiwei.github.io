<div id="adminUsers"></div>

<script>

// Name format validator
function validateNameFormat(name) {
  const pattern = /^[A-Za-z\s]+,\s[A-Za-z\s]+(\s[A-Za-z]\.?)?$/;
  return pattern.test(name);
}

function normalizeName(name) {
  return name
    .toLowerCase()
    .replace(/[.,]/g, "")       // remove punctuation
    .replace(/\s+/g, " ")       // normalize spaces
    .trim();
}

function normalizeStudentNumber(num) {
  return num
    .toUpperCase()
    .replace(/\s+/g, "")
    .replace(/-/g, "");
}

// SIGN UP
async function signUp() {

  const studentRaw = document.getElementById("su_student").value.trim();
  const student = normalizeStudentNumber(studentRaw);
  const name = document.getElementById("su_name").value.trim();
  const email = document.getElementById("su_email").value.trim();
  const phone = document.getElementById("su_phone").value.trim();
  const password = document.getElementById("su_password").value;

  const normalizedInput = normalizeName(name);


  const { data: students, error } = await supabaseClient
    .from("students_masterlist")
    .select("*");

  if (error) {
  console.error(error);
  alert("Database error: " + error.message);
  return;
}


  const studentData = students.find(s =>
    normalizeStudentNumber(s.student_number) === student
  );

  if (!studentData) {
    alert("Student number not found.");
    return;
  }


  const normalizedDB = normalizeName(studentData.full_name);

  if (!normalizedDB.includes(normalizedInput) &&
      !normalizedInput.includes(normalizedDB)) {
    alert("Student name does not match records.");
    return;
  }


  if (studentData.is_registered) {
    alert("This student is already registered.");
    return;
  }


  const { data: authData, error: authError } =
    await supabaseClient.auth.signUp({
      email: email,
      password: password
    });

  if (authError) {
    alert(authError.message);
    return;
  }


  const user = authData.user;


  const { error: rpcError } = await supabaseClient.rpc('register_student', {
  p_student_number: studentData.student_number,
  p_full_name: studentData.full_name,
  p_email: email,
  p_phone: phone,
  p_user_id: user.id
});

if (rpcError) {
  console.error(rpcError);
  alert("Registration failed: " + rpcError.message);
  return;
}	


  await supabaseClient
    .from("students_masterlist")
    .update({ is_registered: true })
    .eq("student_number", studentData.student_number);

  alert("Registration successful! Check your email.");
}



// LOGIN
async function login() {

  const student = normalizeStudentNumber(
  document.getElementById("li_student").value
);
  const email = document.getElementById("li_email").value.trim();
  const password = document.getElementById("li_password").value;

  const { data, error } =
    await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    });

  if (error) {
    alert(error.message);
    return;
  }

  const user = data.user;


  const { data: profiles } = await supabaseClient
  .from("profiles")
  .select("*")
  .eq("id", user.id);

const profile = profiles.find(p =>
  normalizeStudentNumber(p.student_number) === student
);


  if (!profile) {
    alert("Student number mismatch.");
    await supabaseClient.auth.signOut();
    return;
  }


  if (profile.role === "admin") {
    alert("Welcome Admin!");
  } else {
    alert("Welcome User!");
  }

}


// expose functions globally for buttons
window.signUp = signUp;
window.login = login;


//-------------ADMIN STUFF

async function loadUsers() {
  const { data: profiles, error } = await supabaseClient
    .from('profiles')
    .select('*')
    .order('full_name');

  if (error) {
    alert('Failed to load users: ' + error.message);
    return;
  }

  const container = document.getElementById('adminUsers');
  container.innerHTML = '';

  profiles.forEach(user => {
    const div = document.createElement('div');
    div.style.marginBottom = '10px';
    div.innerHTML = `
      <strong>${user.full_name}</strong> (${user.student_number}) - ${user.email} 
      <button onclick="deleteUser('${user.id}', '${user.student_number}')">Delete</button>
    `;
    container.appendChild(div);
  });
}

async function deleteUser(user_id, student_number) {
  if (!confirm('Are you sure you want to delete this user?')) return;

  try {
    const res = await fetch('http://localhost:3000/delete-user', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id, student_number })
    });
    const result = await res.json();
    if (result.error) {
      alert('Error deleting user: ' + result.error);
      return;
    }
    alert('User deleted successfully');
    loadUsers(); // refresh list
  } catch (err) {
    alert('Network error: ' + err.message);
  }
}



// server.js
import express from 'express';
import { createClient } from '@supabase/supabase-js';
import cors from 'cors';

const app = express();
app.use(cors());
app.use(express.json());

const supabaseAdmin = createClient(
  "https://vwzhzycagqqhcxbopjtc.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3emh6eWNhZ3FxaGN4Ym9wanRjIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDU2Mjg2MSwiZXhwIjoyMDkwMTM4ODYxfQ.b07eMHXUVXOeqQtWnsWTk7F5VFFaRbIwHGc_iay6tiE

);

// Delete user by ID
app.post('/delete-user', async (req, res) => {
  const { user_id, student_number } = req.body;

  if (!user_id || !student_number) {
    return res.status(400).json({ error: 'Missing parameters' });
  }

  try {
    // Delete user from Auth
    const { error: authError } = await supabaseAdmin.auth.admin.deleteUser(user_id);
    if (authError) throw authError;

    // Delete profile
    const { error: profileError } = await supabaseAdmin
      .from('profiles')
      .delete()
      .eq('id', user_id);
    if (profileError) throw profileError;

    // Reset masterlist registration
    const { error: masterError } = await supabaseAdmin
      .from('students_masterlist')
      .update({ is_registered: false })
      .eq('student_number', student_number);
    if (masterError) throw masterError;

    res.json({ success: true });
  } catch (e) {
    res.status(500).json({ error: e.message });
  }
});

app.listen(3000, () => console.log('Admin API running on port 3000'));
</script>
