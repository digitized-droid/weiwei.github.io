<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body { font-family: Arial; padding:20px; }
input { margin:5px; padding:6px; }
button { margin:5px; padding:6px; }
</style>

</head>
<body>

<h2>Admin Dashboard</h2>

<h3>📊 Stats</h3>
<div id="stats"></div>

<hr>

<h3>➕ Add Student</h3>
<input id="new_number" placeholder="Student Number">
<input id="new_name" placeholder="Full Name">
<button onclick="addStudent()">Add</button>

<hr>

<h3>📋 Student Masterlist</h3>
<div id="students"></div>

<hr>

<h3>👥 Registered Users</h3>
<button onclick="loadUsers()">Load Users</button>
<div id="users"></div>

<script>

const ADMIN_KEY = "secret123"; // must match backend

// 📊 Load stats
async function loadStats() {
  const res = await fetch('http://localhost:3000/stats', {
    headers: { 'x-admin-key': ADMIN_KEY }
  });

  const data = await res.json();

  document.getElementById('stats').innerText =
    `Total Registered Users: ${data.totalUsers}`;
}

// 📋 Load masterlist
async function loadStudents() {
  const res = await fetch('http://localhost:3000/students', {
    headers: { 'x-admin-key': ADMIN_KEY }
  });

  const data = await res.json();

  document.getElementById('students').innerHTML = data.map(s => `
    <div>
      <input value="${s.student_number}" id="num-${s.id}">
      <input value="${s.full_name}" id="name-${s.id}">
      <button onclick="updateStudent('${s.id}')">Update</button>
      <button onclick="deleteStudent('${s.id}')">Delete</button>
    </div>
  `).join('');
}

// ➕ Add student
async function addStudent() {
  const student_number = document.getElementById('new_number').value;
  const full_name = document.getElementById('new_name').value;

  await fetch('http://localhost:3000/add-student', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-admin-key': ADMIN_KEY
    },
    body: JSON.stringify({ student_number, full_name })
  });

  loadStudents();
}

// ✏️ Update student
async function updateStudent(id) {
  const student_number = document.getElementById(`num-${id}`).value;
  const full_name = document.getElementById(`name-${id}`).value;

  await fetch('http://localhost:3000/update-student', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-admin-key': ADMIN_KEY
    },
    body: JSON.stringify({ id, student_number, full_name })
  });

  loadStudents();
}

// ❌ Delete student
async function deleteStudent(id) {
  await fetch('http://localhost:3000/delete-student', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-admin-key': ADMIN_KEY
    },
    body: JSON.stringify({ id })
  });

  loadStudents();
}

// 👥 Load registered users
async function loadUsers() {
  const res = await fetch('http://localhost:3000/all-users', {
    headers: { 'x-admin-key': ADMIN_KEY }
  });

  const data = await res.json();

  document.getElementById('users').innerHTML = data.map(u => `
    <div>
      ${u.full_name} (${u.student_number})
    </div>
  `).join('');
}

// initial load
loadStats();
loadStudents();

</script>

</body>
</html>
